<!DOCTYPE html>
<html lang="de" class="h-full" xmlns:th="http://www.thymeleaf.org"
      th:style="${accent != null} ? '--accent:' + ${accent.color} + ';--accent-fg:' + ${accent.onColor} : null">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <meta name="color-scheme" content="dark">
    <title th:text="${vehicle != null} ? 'Fahrzeug bearbeiten' : 'Neues Fahrzeug'">Fahrzeug</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <th:block th:replace="~{fragments/theme :: accent}"></th:block>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 antialiased selection:bg-accent/30">
<main class="mx-auto flex h-full w-full max-w-md flex-col px-4
             pt-[max(env(safe-area-inset-top),1rem)]
             pb-[max(env(safe-area-inset-bottom),1rem)]">

    <div th:replace="~{fragments/header :: header(home=true)}"></div>

    <h1 class="mb-6 text-2xl font-extrabold tracking-tight"
        th:text="${vehicle != null} ? 'Fahrzeug bearbeiten' : 'Neues Fahrzeug'">Neues Fahrzeug</h1>

    <!-- new → POST /vehicles ; edit → POST /vehicles/{id} -->
    <form th:action="${vehicle != null} ? @{/vehicles/{id}(id=${vehicle.id})} : @{/vehicles}"
          method="post"
          class="flex flex-col gap-6">

        <label class="flex flex-col gap-2">
            <span class="text-sm text-zinc-400">Name</span>
            <input type="text" name="name" required autofocus autocomplete="off"
                   th:value="${vehicle?.name}"
                   placeholder="z.B. Kombi"
                   class="rounded-xl border-b-2 border-accent bg-zinc-900 px-4 py-3 text-lg
                          text-zinc-100 caret-accent outline-none placeholder:text-zinc-600">
        </label>

        <label class="flex items-center justify-between gap-4">
            <span class="text-sm text-zinc-400">Farbe</span>
            <input type="color" name="color"
                   th:value="${vehicle != null} ? ${vehicle.color} : '#06b6d4'"
                   class="h-12 w-20 cursor-pointer rounded-lg border border-white/10 bg-transparent">
        </label>

        <!-- Trip-meter flag: drives how the distance is entered when refueling.
             On  → type the driven km directly (resettable trip meter).
             Off → type the absolute odometer reading; the distance is computed. -->
        <label class="flex items-start justify-between gap-4">
            <span class="flex flex-col gap-1">
                <span class="text-sm text-zinc-200">Tageskilometer-Zähler</span>
                <span class="text-xs text-zinc-500">An: gefahrene km direkt eingeben ·
                    Aus: Gesamt-km eingeben, Distanz wird berechnet</span>
            </span>
            <input type="checkbox" name="hasTripMeter" value="true"
                   th:checked="${vehicle == null} or ${vehicle.hasTripMeter}"
                   class="mt-1 h-6 w-6 shrink-0 cursor-pointer accent-[var(--accent,#06b6d4)]">
        </label>

        <div class="mt-auto flex gap-3">
            <a href="/vehicles"
               class="flex-1 rounded-xl bg-zinc-800 px-4 py-4 text-center text-base font-semibold text-zinc-200
                      transition active:scale-[0.98] hover:bg-zinc-700">
                Abbrechen
            </a>
            <button type="submit"
                    class="flex-1 rounded-xl bg-accent px-4 py-4 text-base font-semibold text-accent-fg
                           transition active:scale-[0.98] hover:bg-accent-bright
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-accent-bright">
                Speichern
            </button>
        </div>
    </form>

</main>
</body>
</html>
