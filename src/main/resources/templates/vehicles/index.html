<!DOCTYPE html>
<html lang="de" class="h-full"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <meta name="color-scheme" content="dark">
    <title>Fahrzeuge</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 antialiased selection:bg-cyan-400/30">
<main class="mx-auto flex h-full w-full max-w-md flex-col px-4
             pt-[max(env(safe-area-inset-top),1rem)]
             pb-[max(env(safe-area-inset-bottom),1rem)]">

    <header class="mb-4 flex items-center justify-between text-sm text-zinc-400">
        <a href="/" class="text-zinc-500 transition hover:text-zinc-200">&larr; Tanken</a>
        <span sec:authentication="principal.attributes['displayName']">Fahrer</span>
        <form action="/logout" method="post">
            <button type="submit"
                    class="rounded-lg px-2 py-1 text-zinc-500 transition hover:text-zinc-200
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-zinc-600">
                Abmelden
            </button>
        </form>
    </header>

    <h1 class="mb-4 text-2xl font-extrabold tracking-tight">Fahrzeuge</h1>

    <div class="flex flex-col gap-3">

        <!-- Empty state -->
        <p th:if="${vehicles.isEmpty()}" class="rounded-xl bg-zinc-900/60 px-4 py-8 text-center text-zinc-500">
            Noch keine Fahrzeuge.
        </p>

        <!-- Vehicle cards -->
        <div th:each="vehicle : ${vehicles}"
             th:data-vehicle="${vehicle.id}"
             class="flex items-center gap-3 rounded-xl bg-zinc-900/60 px-4 py-3">
            <span class="h-8 w-8 shrink-0 rounded-full ring-1 ring-white/10"
                  th:style="'background-color:' + ${vehicle.color}"></span>
            <span class="flex-1 truncate text-lg font-semibold" th:text="${vehicle.name}">Mein Auto</span>
            <a th:href="@{/vehicles/{id}/edit(id=${vehicle.id})}"
               class="rounded-lg px-2 py-1 text-sm text-zinc-400 transition hover:text-zinc-100">
                Bearbeiten
            </a>
            <button type="button"
                    th:hx-delete="@{/vehicles/{id}(id=${vehicle.id})}"
                    hx-target="closest [data-vehicle]"
                    hx-swap="outerHTML"
                    hx-confirm="Fahrzeug wirklich löschen?"
                    class="rounded-lg px-2 py-1 text-sm text-rose-400/80 transition hover:text-rose-300">
                Löschen
            </button>
        </div>

    </div>

    <a href="/vehicles/new"
       class="mt-6 w-full rounded-xl bg-cyan-500 px-4 py-4 text-center text-base font-semibold text-cyan-950
              transition active:scale-[0.98] hover:bg-cyan-400
              focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300">
        + Neues Fahrzeug
    </a>

</main>
</body>
</html>
