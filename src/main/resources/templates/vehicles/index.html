<!DOCTYPE html>
<html lang="de" class="h-full"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:style="${accent != null} ? '--accent:' + ${accent.color} + ';--accent-fg:' + ${accent.onColor} : null">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <meta name="color-scheme" content="dark">
    <title>Fahrzeuge</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>
    <th:block th:replace="~{fragments/theme :: accent}"></th:block>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 antialiased selection:bg-accent/30">
<main class="mx-auto flex h-full w-full max-w-md flex-col px-4
             pt-[max(env(safe-area-inset-top),1rem)]
             pb-[max(env(safe-area-inset-bottom),1rem)]">

    <div th:replace="~{fragments/header :: header(home=true)}"></div>

    <h1 class="mb-4 text-2xl font-extrabold tracking-tight">Fahrzeuge</h1>

    <div class="flex flex-col gap-3">

        <!-- Empty state -->
        <p th:if="${vehicles.isEmpty()}" class="rounded-xl bg-zinc-900/60 px-4 py-8 text-center text-zinc-500">
            Noch keine Fahrzeuge.
        </p>

        <!-- Vehicle cards. The active context is ringed; the name spans the full width,
             stats sit below, and the actions occupy their own bottom row. -->
        <div th:each="vehicle : ${vehicles}"
             th:data-vehicle="${vehicle.id}"
             th:with="s=${stats.get(vehicle.id)}"
             th:classappend="${selectedVehicle?.id == vehicle.id} ? 'ring-2 ring-accent' : ''"
             class="flex flex-col gap-3 rounded-2xl bg-zinc-900/60 p-4">

            <!-- name row: the name may use the full card width -->
            <div class="flex items-center gap-3">
                <span class="h-9 w-9 shrink-0 rounded-full ring-1 ring-white/10"
                      th:style="'background-color:' + ${vehicle.color}"></span>
                <span class="min-w-0 flex-1 truncate text-xl font-bold tracking-tight"
                      th:text="${vehicle.name}">Mein Auto</span>
            </div>

            <!-- stats: period-average consumption and total tracked distance -->
            <div class="grid grid-cols-2 gap-3">
                <div class="rounded-xl bg-zinc-950/40 px-3 py-2.5">
                    <div class="text-[10px] uppercase tracking-wide text-zinc-500">Ø Verbrauch</div>
                    <div class="tabular-nums" data-testid="avg-consumption">
                        <th:block th:if="${s.averageConsumptionPer100Km != null}">
                            <span class="text-xl font-semibold"
                                  th:text="${#numbers.formatDecimal(s.averageConsumptionPer100Km, 1, 'POINT', 2, 'POINT')}">7.42</span>
                            <span class="text-xs text-zinc-500">L/100 km</span>
                        </th:block>
                        <span th:unless="${s.averageConsumptionPer100Km != null}"
                              class="text-xl font-semibold text-zinc-600">—</span>
                    </div>
                    <!-- outliers are dropped from the average; tell the user why it shifts -->
                    <div th:if="${s.outlierCount > 0}" class="mt-0.5 text-[10px] text-zinc-600"
                         th:text="'ohne ' + ${s.outlierCount} + ' Ausreißer'">ohne 1 Ausreißer</div>
                </div>
                <div class="rounded-xl bg-zinc-950/40 px-3 py-2.5">
                    <div class="text-[10px] uppercase tracking-wide text-zinc-500">Strecke</div>
                    <div class="tabular-nums" data-testid="total-distance">
                        <span class="text-xl font-semibold"
                              th:text="${#numbers.formatDecimal(s.totalKilometers, 1, 'POINT', 0, 'POINT')}">12.340</span>
                        <span class="text-xs text-zinc-500">km</span>
                    </div>
                </div>
            </div>

            <!-- actions row: select/active on the left, icon actions on the right -->
            <div class="flex items-center gap-1 border-t border-white/5 pt-3">
                <span th:if="${selectedVehicle?.id == vehicle.id}"
                      data-testid="active-vehicle"
                      class="flex-1 px-1 text-sm font-semibold text-accent">✓ Aktiv</span>
                <form th:unless="${selectedVehicle?.id == vehicle.id}"
                      th:action="@{/vehicles/{id}/select(id=${vehicle.id})}" method="post" class="flex-1">
                    <button type="submit" data-testid="select-vehicle"
                            class="rounded-lg px-1 py-1 text-sm font-medium text-accent transition hover:text-accent-bright">
                        Als aktiv wählen
                    </button>
                </form>

                <!-- actions as icons to save room: fuel list · edit · delete -->
                <a th:href="@{/vehicles/{id}/fuel(id=${vehicle.id})}"
                   data-testid="fuel-list-link"
                   aria-label="Betankungen" title="Betankungen"
                   class="rounded-lg p-2 text-zinc-400 transition hover:text-accent-bright
                          focus:outline-none focus-visible:ring-2 focus-visible:ring-accent">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5"></path>
                    </svg>
                </a>
                <a th:href="@{/vehicles/{id}/edit(id=${vehicle.id})}"
                   aria-label="Bearbeiten" title="Bearbeiten"
                   class="rounded-lg p-2 text-zinc-400 transition hover:text-zinc-100
                          focus:outline-none focus-visible:ring-2 focus-visible:ring-zinc-500">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M16.862 4.487l1.688-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931z"></path>
                        <path d="M19.5 13.5V18A2.25 2.25 0 0 1 17.25 20.25H6A2.25 2.25 0 0 1 3.75 18V6.75A2.25 2.25 0 0 1 6 4.5h4.5"></path>
                    </svg>
                </a>
                <button type="button"
                        th:hx-delete="@{/vehicles/{id}(id=${vehicle.id})}"
                        hx-target="closest [data-vehicle]"
                        hx-swap="outerHTML"
                        hx-confirm="Fahrzeug wirklich löschen?"
                        aria-label="Löschen" title="Löschen"
                        class="rounded-lg p-2 text-rose-400/80 transition hover:text-rose-300
                               focus:outline-none focus-visible:ring-2 focus-visible:ring-rose-400">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M6 7.5h12M9.75 7.5V6A1.5 1.5 0 0 1 11.25 4.5h1.5A1.5 1.5 0 0 1 14.25 6v1.5M8.25 7.5V18A1.5 1.5 0 0 0 9.75 19.5h4.5A1.5 1.5 0 0 0 15.75 18V7.5M10.5 10.5v6M13.5 10.5v6"></path>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <a href="/vehicles/new"
       class="mt-6 w-full rounded-xl bg-accent px-4 py-4 text-center text-base font-semibold text-accent-fg
              transition active:scale-[0.98] hover:bg-accent-bright
              focus:outline-none focus-visible:ring-2 focus-visible:ring-accent-bright">
        + Neues Fahrzeug
    </a>

</main>
</body>
</html>
