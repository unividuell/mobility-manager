<!DOCTYPE html>
<html lang="de" class="h-full" xmlns:th="http://www.thymeleaf.org"
      th:style="'--accent:' + ${vehicle.color}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <meta name="color-scheme" content="dark">
    <title th:text="'Betankung bearbeiten · ' + ${vehicle.name}">Betankung bearbeiten</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <th:block th:replace="~{fragments/theme :: accent}"></th:block>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 antialiased selection:bg-accent/30">
<main class="mx-auto flex h-full w-full max-w-md flex-col px-4
             pt-[max(env(safe-area-inset-top),1rem)]
             pb-[max(env(safe-area-inset-bottom),1rem)]">

    <div th:replace="~{fragments/header :: header(home=true)}"></div>

    <h1 class="mb-1 flex items-center gap-2 text-2xl font-extrabold tracking-tight">
        <span class="h-4 w-4 shrink-0 rounded-full ring-1 ring-white/10"
              th:style="'background-color:' + ${vehicle.color}"></span>
        Betankung bearbeiten
    </h1>
    <p class="mb-6 text-sm text-zinc-500" th:text="${vehicle.name}">Kombi</p>

    <!-- Edit everything, including BOTH distance fields. If a trip distance is set
         it drives the consumption calc; the total reading is kept for history. -->
    <form th:action="@{/vehicles/{vid}/fuel/{id}(vid=${vehicle.id},id=${entry.id})}"
          method="post" class="flex flex-1 flex-col gap-5">

        <label class="flex items-center justify-between gap-4">
            <span class="text-sm text-zinc-400">Datum</span>
            <input type="date" name="date" required th:value="${entry.date}"
                   class="rounded-xl border-b-2 border-accent bg-zinc-900 px-4 py-3 text-base
                          text-zinc-100 caret-accent outline-none [color-scheme:dark]">
        </label>

        <label class="flex items-center justify-between gap-4">
            <span class="text-sm text-zinc-400">Liter</span>
            <input type="number" name="liters" required inputmode="decimal" step="0.01" min="0"
                   th:value="${entry.liters}"
                   class="w-40 rounded-xl border-b-2 border-accent bg-zinc-900 px-4 py-3 text-right text-base
                          tabular-nums text-zinc-100 caret-accent outline-none">
        </label>

        <label class="flex items-center justify-between gap-4">
            <span class="text-sm text-zinc-400">€ / Liter</span>
            <input type="number" name="pricePerLiter" required inputmode="decimal" step="0.001" min="0"
                   th:value="${entry.pricePerLiter}"
                   class="w-40 rounded-xl border-b-2 border-accent bg-zinc-900 px-4 py-3 text-right text-base
                          tabular-nums text-zinc-100 caret-accent outline-none">
        </label>

        <label class="flex items-center justify-between gap-4">
            <span class="flex flex-col">
                <span class="text-sm text-zinc-400">Tageskilometer</span>
                <span class="text-xs text-zinc-600">gefahrene km — zählt für den Verbrauch</span>
            </span>
            <input type="number" name="kilometers" inputmode="decimal" step="0.1" min="0"
                   placeholder="—" th:value="${entry.kilometers}"
                   class="w-40 rounded-xl border-b-2 border-zinc-700 bg-zinc-900 px-4 py-3 text-right text-base
                          tabular-nums text-zinc-100 caret-accent outline-none placeholder:text-zinc-700
                          focus:border-accent">
        </label>

        <label class="flex items-center justify-between gap-4">
            <span class="flex flex-col">
                <span class="text-sm text-zinc-400">Gesamt-km</span>
                <span class="text-xs text-zinc-600">Kilometerstand — für die Historie</span>
            </span>
            <input type="number" name="odometer" inputmode="numeric" step="1" min="0"
                   placeholder="—" th:value="${entry.odometer}"
                   class="w-40 rounded-xl border-b-2 border-zinc-700 bg-zinc-900 px-4 py-3 text-right text-base
                          tabular-nums text-zinc-100 caret-accent outline-none placeholder:text-zinc-700
                          focus:border-accent">
        </label>

        <div class="mt-auto flex gap-3">
            <a th:href="@{/vehicles/{vid}/fuel(vid=${vehicle.id})}"
               class="flex-1 rounded-xl bg-zinc-800 px-4 py-4 text-center text-base font-semibold text-zinc-200
                      transition active:scale-[0.98] hover:bg-zinc-700">
                Abbrechen
            </a>
            <button type="submit"
                    class="flex-1 rounded-xl bg-accent px-4 py-4 text-base font-semibold text-accent-fg
                           transition active:scale-[0.98] hover:bg-accent-bright
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-accent-bright">
                Speichern
            </button>
        </div>
    </form>

    <!-- delete lives here now (it used to be the fuel list's long-press action) -->
    <form th:action="@{/vehicles/{vid}/fuel/{id}/delete(vid=${vehicle.id},id=${entry.id})}"
          method="post" class="mt-3"
          onsubmit="return confirm('Diese Betankung löschen?');">
        <button type="submit" data-testid="delete-entry"
                class="w-full rounded-xl px-4 py-3 text-sm font-medium text-rose-400/90
                       transition hover:bg-rose-500/10 hover:text-rose-300
                       focus:outline-none focus-visible:ring-2 focus-visible:ring-rose-400">
            Betankung löschen
        </button>
    </form>

</main>
</body>
</html>
