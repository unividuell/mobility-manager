<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Single swappable panel. Two states:
    saved == null  → draft mode (slot tiles + giant number input)
    saved != null  → result mode (hero L/100km figure + meta grid + reset)
-->
<section th:fragment="panel" id="panel" class="flex h-full flex-col gap-4">

    <!-- ============================================================ -->
    <!-- Result state                                                  -->
    <!-- ============================================================ -->
    <div th:if="${saved != null}"
         data-testid="result-panel"
         class="flex h-full flex-col gap-6 rounded-2xl bg-emerald-950/40 p-6"
         th:object="${saved}">

        <div class="flex flex-1 flex-col items-center justify-center gap-1 text-center">
            <span class="text-7xl font-extrabold tabular-nums tracking-tight text-emerald-400 sm:text-8xl"
                  th:text="${#numbers.formatDecimal(saved.consumptionPer100Km, 1, 'POINT', 2, 'POINT')}">8.72</span>
            <span class="text-base text-zinc-400 sm:text-lg">L / 100 km</span>

            <!-- consumption trend vs. the previous refueling (down = greener = good) -->
            <span th:if="${consumptionDelta != null}" data-testid="consumption-delta"
                  th:classappend="${consumptionDelta.increased ? 'text-rose-400' : (consumptionDelta.decreased ? 'text-emerald-400' : 'text-zinc-400')}"
                  class="mt-1 flex items-center gap-1.5 text-sm font-medium tabular-nums">
                <span aria-hidden="true"
                      th:text="${consumptionDelta.increased ? '▲' : (consumptionDelta.decreased ? '▼' : '=')}">▲</span>
                <span th:text="${consumptionDelta.sign + #numbers.formatDecimal(consumptionDelta.absDiff, 1, 'POINT', 2, 'POINT') + ' L/100 km'}">+0.42 L/100 km</span>
                <span class="font-normal text-zinc-500">vs. zuletzt</span>
            </span>

            <span class="mt-2 flex items-center gap-2 text-sm text-zinc-400">
                <span th:if="${pickedVehicle != null}" class="h-3 w-3 rounded-full ring-1 ring-white/10"
                      th:style="'background-color:' + ${pickedVehicle.color}"></span>
                <span th:if="${pickedVehicle != null}" th:text="${pickedVehicle.name}">Kombi</span>
                <span th:if="${dateDisplay != null}" th:text="${pickedVehicle != null} ? '· ' + ${dateDisplay} : ${dateDisplay}">· 20.05.2026</span>
            </span>
        </div>

        <dl class="grid grid-cols-2 gap-x-4 gap-y-3 text-left">
            <div>
                <dt class="text-xs uppercase tracking-wide text-zinc-500">Getankt</dt>
                <dd class="text-lg font-semibold tabular-nums sm:text-xl"
                    th:text="${#numbers.formatDecimal(saved.liters, 1, 'POINT', 2, 'POINT') + ' L'}">45.32 L</dd>
            </div>
            <div>
                <dt class="text-xs uppercase tracking-wide text-zinc-500">Preis</dt>
                <dd class="text-lg font-semibold tabular-nums sm:text-xl"
                    th:text="${#numbers.formatDecimal(saved.pricePerLiter, 1, 'POINT', 3, 'POINT') + ' €/L'}">1.859 €/L</dd>
            </div>
            <div>
                <dt class="text-xs uppercase tracking-wide text-zinc-500">Strecke</dt>
                <dd class="text-lg font-semibold tabular-nums sm:text-xl"
                    th:text="${#numbers.formatDecimal(saved.kilometers, 1, 'POINT', 1, 'POINT') + ' km'}">520.0 km</dd>
            </div>
            <div>
                <dt class="text-xs uppercase tracking-wide text-zinc-500">Kosten</dt>
                <dd class="text-lg font-semibold tabular-nums sm:text-xl"
                    th:text="${#numbers.formatDecimal(saved.totalCost, 1, 'POINT', 2, 'POINT') + ' €'}">84.25 €</dd>
            </div>
        </dl>

        <div class="mt-auto flex flex-col items-center gap-3">
            <form hx-post="/fuel/reset" hx-target="#panel" hx-swap="outerHTML" class="w-full">
                <button type="submit"
                        class="w-full rounded-xl bg-emerald-500 px-4 py-4 text-base font-semibold text-emerald-950
                               transition active:scale-[0.98] hover:bg-emerald-400
                               focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300">
                    Nächste Tankung
                </button>
            </form>
            <form hx-post="/fuel/undo" hx-target="#panel" hx-swap="outerHTML">
                <input type="hidden" name="id" th:value="${saved.id}">
                <button type="submit" data-testid="undo-button"
                        class="rounded text-sm text-zinc-500 underline-offset-4 transition
                               hover:text-zinc-300 hover:underline
                               focus:outline-none focus-visible:ring-2 focus-visible:ring-zinc-500">
                    Eingabe rückgängig machen
                </button>
            </form>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- Draft state                                                   -->
    <!-- ============================================================ -->
    <div th:if="${saved == null}"
         data-testid="draft-panel"
         class="flex h-full flex-col gap-4">

        <div class="grid grid-cols-2 gap-2">

            <div data-testid="slot"
                 th:attr="data-filled=${draft.liters != null}"
                 th:classappend="${draft.liters != null}
                    ? 'border-cyan-400 bg-zinc-900'
                    : 'border-transparent bg-zinc-900/60'"
                 class="flex flex-col gap-0.5 rounded-lg border-l-4 px-3 py-2 transition">
                <span class="text-xs text-zinc-400">Liter</span>
                <span th:classappend="${draft.liters != null} ? 'text-zinc-100' : 'text-zinc-600'"
                      class="text-xl font-semibold tabular-nums"
                      th:text="${draft.liters != null}
                         ? ${#numbers.formatDecimal(draft.liters, 1, 'POINT', 2, 'POINT')}
                         : '—'">—</span>
            </div>

            <div data-testid="slot"
                 th:attr="data-filled=${draft.pricePerLiter != null}"
                 th:classappend="${draft.pricePerLiter != null}
                    ? 'border-cyan-400 bg-zinc-900'
                    : 'border-transparent bg-zinc-900/60'"
                 class="flex flex-col gap-0.5 rounded-lg border-l-4 px-3 py-2 transition">
                <span class="text-xs text-zinc-400">€/Liter</span>
                <span th:classappend="${draft.pricePerLiter != null} ? 'text-zinc-100' : 'text-zinc-600'"
                      class="text-xl font-semibold tabular-nums"
                      th:text="${draft.pricePerLiter != null}
                         ? ${#numbers.formatDecimal(draft.pricePerLiter, 1, 'POINT', 3, 'POINT')}
                         : '—'">—</span>
            </div>

            <div data-testid="slot"
                 th:attr="data-filled=${draft.kilometers != null}"
                 th:classappend="${draft.kilometers != null}
                    ? 'border-cyan-400 bg-zinc-900'
                    : 'border-transparent bg-zinc-900/60'"
                 class="flex flex-col gap-0.5 rounded-lg border-l-4 px-3 py-2 transition">
                <span class="text-xs text-zinc-400">Kilometer</span>
                <span th:classappend="${draft.kilometers != null} ? 'text-zinc-100' : 'text-zinc-600'"
                      class="text-xl font-semibold tabular-nums"
                      th:text="${draft.kilometers != null}
                         ? ${#numbers.formatDecimal(draft.kilometers, 1, 'POINT', 1, 'POINT')}
                         : '—'">—</span>
            </div>

            <!-- the date, defaulting to today; override by typing one (e.g. 20.05.2026) -->
            <div data-testid="slot"
                 th:attr="data-filled=${draft.date != null}"
                 th:classappend="${draft.date != null}
                    ? 'border-cyan-400 bg-zinc-900'
                    : 'border-transparent bg-zinc-900/60'"
                 class="flex flex-col gap-0.5 rounded-lg border-l-4 px-3 py-2 transition">
                <span class="text-xs text-zinc-400">Datum</span>
                <span th:classappend="${draft.date != null} ? 'text-zinc-100' : 'text-zinc-600'"
                      class="text-xl font-semibold tabular-nums"
                      th:text="${dateDisplay != null} ? ${dateDisplay} : '—'">—</span>
            </div>

        </div>

        <!-- No vehicles yet: nothing to fuel against. -->
        <p th:if="${vehicles.isEmpty()}" class="rounded-xl bg-zinc-900/60 px-4 py-4 text-center text-sm text-zinc-400">
            Erst ein <a href="/vehicles/new" class="text-cyan-400 underline">Fahrzeug anlegen</a>,
            dann tanken.
        </p>

        <!-- Vehicles exist but none is the active context: make the user pick one first. -->
        <p th:if="${not vehicles.isEmpty() and selectedVehicle == null}"
           data-testid="select-vehicle-hint"
           class="rounded-xl bg-zinc-900/60 px-4 py-4 text-center text-sm text-zinc-400">
            Bitte zuerst ein <a href="/vehicles" class="text-cyan-400 underline">Fahrzeug wählen</a>.
        </p>

        <!-- Input is only offered once a vehicle context is set. -->
        <form th:if="${selectedVehicle != null}"
              hx-post="/fuel/value"
              hx-target="#panel"
              hx-swap="outerHTML"
              hx-on::after-request="this.reset(); this.querySelector('input[name=value]').focus()"
              class="mt-auto">
            <input type="hidden" name="liters" th:value="${draft.liters}">
            <input type="hidden" name="pricePerLiter" th:value="${draft.pricePerLiter}">
            <input type="hidden" name="kilometers" th:value="${draft.kilometers}">
            <input type="hidden" name="date" th:value="${draft.date}">
            <input data-testid="value-input"
                   type="text"
                   inputmode="decimal"
                   name="value"
                   autocomplete="off"
                   autofocus
                   placeholder="0"
                   class="w-full border-b-4 border-cyan-400 bg-transparent py-4 text-center
                          text-7xl font-bold tabular-nums tracking-tight text-zinc-100
                          caret-cyan-400 outline-none placeholder:text-zinc-800
                          sm:text-8xl">
        </form>

    </div>

</section>
</body>
</html>
