spring:
  application:
    name: mobility-manager
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: Ov23lieWH11YI3qPP5Og
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user
  datasource:
    # date_class=text + an ISO date format make the driver store java.time
    # dates (FuelEntry.date) as readable yyyy-MM-dd TEXT instead of epoch millis.
    # foreign_keys=true enforces referential integrity (off by default in SQLite;
    # it's a per-connection PRAGMA, so it must be set on every pooled connection).
    url: jdbc:sqlite:./data/mobility-manager.db?date_class=text&date_string_format=yyyy-MM-dd&foreign_keys=true
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: never
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  thymeleaf:
    cache: false
  session:
    # sessions are persisted to SQLite (spring-session-jdbc) so a login survives
    # an app restart; Flyway owns the schema, so Spring Session must not create it.
    jdbc:
      initialize-schema: never

server:
  port: 8080
  servlet:
    session:
      # long timeout so "stay logged in" is meaningful (the persisted session
      # otherwise still expires after 30 min of inactivity)
      timeout: 30d
