spring:
  application:
    name: mobility-manager
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: Ov23lieWH11YI3qPP5Og
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user
  datasource:
    # date_class=text + an ISO date format make the driver store java.time
    # dates (FuelEntry.date) as readable yyyy-MM-dd TEXT instead of epoch millis.
    url: jdbc:sqlite:./data/mobility-manager.db?date_class=text&date_string_format=yyyy-MM-dd
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: never
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  thymeleaf:
    cache: false

server:
  port: 8080
