spring:
  security:
    oauth2:
      client:
        registration:
          github:
            # Dummy creds so the OAuth2 client autoconfig registers and the
            # SecurityFilterChain can be built; the login flow itself isn't
            # exercised in tests (we use the oauth2Login() request processor).
            client-id: test
            client-secret: test
            scope: read:user
  datasource:
    # SQLite in-memory with shared cache so Hikari's pool sees one DB.
    # Pool size pinned to 1 because SQLite is single-writer anyway.
    url: jdbc:sqlite:file::memory:?cache=shared
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  flyway:
    locations: classpath:db/migration
  thymeleaf:
    cache: false
