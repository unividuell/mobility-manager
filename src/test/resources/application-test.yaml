# Test-only overrides; everything else (datasource driver, flyway, thymeleaf,
# the GitHub OAuth2 client registration with its placeholder creds) is inherited
# from the base src/main/resources/application.yaml. Activated via @ActiveProfiles("test").
spring:
  datasource:
    # SQLite in-memory with shared cache so all Hikari connections see one DB
    # (the shared in-memory DB lives as long as >=1 connection stays open).
    # Pool > 1 is required: loading an aggregate that owns a child collection
    # (Vehicle -> vehicle_managers) needs a second connection concurrently.
    # date_class=text mirrors prod so LocalDate persists as readable ISO TEXT.
    url: jdbc:sqlite:file::memory:?cache=shared&date_class=text&date_string_format=yyyy-MM-dd
    hikari:
      maximum-pool-size: 5
